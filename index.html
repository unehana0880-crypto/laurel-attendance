<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laurel Studio — 근태관리</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    background: #f5f0eb;
    min-height: 100vh;
    padding: 20px;
  }
  header {
    text-align: center;
    padding: 20px 0 28px;
  }
  header h1 {
    font-size: 20px;
    color: #3b2e2e;
    letter-spacing: 2px;
    font-weight: 600;
  }
  header p {
    font-size: 12px;
    color: #9e8a7e;
    margin-top: 4px;
    letter-spacing: 1px;
  }

  /* 날짜 네비게이션 */
  .date-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 20px;
  }
  .date-nav button {
    background: none;
    border: 1px solid #c9b8a8;
    border-radius: 50%;
    width: 32px; height: 32px;
    cursor: pointer;
    font-size: 16px;
    color: #6b5344;
  }
  .date-nav .date-label {
    font-size: 15px;
    font-weight: 600;
    color: #3b2e2e;
    min-width: 130px;
    text-align: center;
  }
  .today-btn {
    font-size: 11px;
    padding: 4px 10px;
    border: 1px solid #c9b8a8;
    border-radius: 12px;
    background: white;
    color: #6b5344;
    cursor: pointer;
  }

  /* 직원 카드 */
  .staff-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 480px;
    margin: 0 auto;
  }
  .staff-card {
    background: white;
    border-radius: 16px;
    padding: 18px 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .staff-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .staff-name {
    font-size: 16px;
    font-weight: 600;
    color: #3b2e2e;
  }
  .staff-role {
    font-size: 11px;
    color: #9e8a7e;
    margin-top: 2px;
  }
  .status-badge {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 500;
  }
  .status-off    { background: #f0ebe5; color: #9e8a7e; }
  .status-in     { background: #e8f5e9; color: #388e3c; }
  .status-out    { background: #e3f2fd; color: #1565c0; }

  /* 시간 표시 */
  .time-row {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
  }
  .time-box {
    flex: 1;
    background: #faf8f5;
    border-radius: 10px;
    padding: 10px 12px;
    text-align: center;
  }
  .time-box label {
    font-size: 10px;
    color: #9e8a7e;
    display: block;
    margin-bottom: 4px;
    letter-spacing: 0.5px;
  }
  .time-box .time-val {
    font-size: 18px;
    font-weight: 700;
    color: #3b2e2e;
    letter-spacing: 1px;
  }
  .time-box .time-val.empty {
    color: #d4c5b8;
    font-size: 14px;
    font-weight: 400;
  }

  /* 버튼 */
  .btn-row {
    display: flex;
    gap: 8px;
  }
  .btn {
    flex: 1;
    padding: 11px;
    border: none;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
    letter-spacing: 0.5px;
  }
  .btn:disabled { opacity: 0.35; cursor: default; }
  .btn-in  { background: #4caf50; color: white; }
  .btn-out { background: #2196f3; color: white; }
  .btn-reset { background: #f5f0eb; color: #9e8a7e; border: 1px solid #e0d5cc; flex: 0 0 auto; padding: 11px 14px; }

  /* 메모 */
  .memo-row {
    margin-top: 10px;
  }
  .memo-row input {
    width: 100%;
    border: 1px solid #e8ddd5;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    color: #3b2e2e;
    background: #faf8f5;
    outline: none;
  }
  .memo-row input:focus { border-color: #c9b8a8; }

  /* 로그 섹션 */
  .log-section {
    max-width: 480px;
    margin: 24px auto 0;
    background: white;
    border-radius: 16px;
    padding: 18px 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .log-section h3 {
    font-size: 13px;
    color: #9e8a7e;
    margin-bottom: 12px;
    letter-spacing: 1px;
  }
  .log-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid #f5f0eb;
    font-size: 13px;
  }
  .log-item:last-child { border-bottom: none; }
  .log-name { color: #3b2e2e; font-weight: 500; }
  .log-detail { color: #9e8a7e; font-size: 12px; }
  .log-hours { color: #6b5344; font-weight: 600; }
  .no-log { color: #d4c5b8; font-size: 13px; text-align: center; padding: 12px 0; }

  /* 연결 상태 */
  .conn-status {
    text-align: center;
    font-size: 11px;
    margin-bottom: 16px;
    padding: 6px;
    border-radius: 8px;
  }
  .conn-ok  { color: #4caf50; background: #e8f5e9; }
  .conn-err { color: #f44336; background: #ffebee; }
  .conn-ing { color: #ff9800; background: #fff3e0; }

  .sync-time {
    text-align: center;
    font-size: 10px;
    color: #c9b8a8;
    margin-top: 16px;
    margin-bottom: 8px;
  }
</style>
</head>
<body>

<header>
  <h1>🌿 LAUREL STUDIO</h1>
  <p>근태 관리</p>
</header>

<div class="conn-status conn-ing" id="connStatus">Firebase 연결 중...</div>

<div class="date-nav">
  <button onclick="changeDate(-1)">‹</button>
  <span class="date-label" id="dateLabel"></span>
  <button onclick="changeDate(1)">›</button>
  <button class="today-btn" onclick="goToday()">오늘</button>
</div>

<div class="staff-grid" id="staffGrid"></div>

<div class="log-section">
  <h3>📋 당일 요약</h3>
  <div id="logList"><p class="no-log">기록 없음</p></div>
</div>

<div class="sync-time" id="syncTime"></div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA0nJAcOV64dq2QT2BVSsGxis99VTA2eEI",
  authDomain: "laurel-studio.firebaseapp.com",
  databaseURL: "https://laurel-studio-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "laurel-studio",
  storageBucket: "laurel-studio.firebasestorage.app",
  messagingSenderId: "516403607342",
  appId: "1:516403607342:web:5389cdfe397afcee1cacbf",
  measurementId: "G-JXJVBBYW9P"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// ── 직원 목록 ──────────────────────────────
const STAFF = [
  { id: "yejin",  name: "배예진", role: "매니저" },
  { id: "dawn",   name: "다운",   role: "웨이팅룸 담당" },
  { id: "sujin",  name: "수진",   role: "매니저 (5월~)" },
];

// ── 날짜 상태 ──────────────────────────────
let currentDate = new Date();
function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function dateDisplay(d) {
  const days = ['일','월','화','수','목','금','토'];
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
}
function isToday(d) {
  const t = new Date();
  return dateKey(d) === dateKey(t);
}

window.changeDate = (delta) => {
  currentDate.setDate(currentDate.getDate() + delta);
  loadDay();
};
window.goToday = () => { currentDate = new Date(); loadDay(); };

// ── 데이터 캐시 ────────────────────────────
let dayData = {};   // { yejin: {in, out, memo}, ... }

// ── Firebase 읽기/쓰기 ─────────────────────
function dbPath(staffId) {
  return `attendance/${dateKey(currentDate)}/${staffId}`;
}

async function saveRecord(staffId) {
  const r = dayData[staffId] || {};
  await set(ref(db, dbPath(staffId)), r);
  updateSyncTime();
}

async function loadDay() {
  document.getElementById('dateLabel').textContent = dateDisplay(currentDate);
  const snap = await get(ref(db, `attendance/${dateKey(currentDate)}`));
  dayData = snap.exists() ? snap.val() : {};
  renderAll();
}

// ── 출근 / 퇴근 ───────────────────────────
window.clockIn = (staffId) => {
  if (!dayData[staffId]) dayData[staffId] = {};
  dayData[staffId].in = nowHHMM();
  saveRecord(staffId);
  renderAll();
};
window.clockOut = (staffId) => {
  if (!dayData[staffId]) dayData[staffId] = {};
  dayData[staffId].out = nowHHMM();
  saveRecord(staffId);
  renderAll();
};
window.resetRecord = (staffId) => {
  if (!confirm(`${STAFF.find(s=>s.id===staffId).name} 기록을 초기화할까요?`)) return;
  dayData[staffId] = {};
  saveRecord(staffId);
  renderAll();
};
window.saveMemo = (staffId, val) => {
  if (!dayData[staffId]) dayData[staffId] = {};
  dayData[staffId].memo = val;
  saveRecord(staffId);
};

function nowHHMM() {
  const n = new Date();
  return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
}

// ── 근무 시간 계산 ─────────────────────────
function calcHours(inT, outT) {
  if (!inT || !outT) return null;
  const [ih, im] = inT.split(':').map(Number);
  const [oh, om] = outT.split(':').map(Number);
  const diff = (oh*60+om) - (ih*60+im);
  if (diff <= 0) return null;
  const h = Math.floor(diff/60), m = diff%60;
  return m ? `${h}h ${m}m` : `${h}h`;
}

// ── 렌더링 ────────────────────────────────
function renderAll() {
  renderCards();
  renderLog();
}

function renderCards() {
  const grid = document.getElementById('staffGrid');
  grid.innerHTML = '';
  const today = isToday(currentDate);

  STAFF.forEach(s => {
    const rec = dayData[s.id] || {};
    const hasIn  = !!rec.in;
    const hasOut = !!rec.out;
    let statusClass = 'status-off', statusText = '미출근';
    if (hasIn && hasOut) { statusClass='status-out'; statusText='퇴근'; }
    else if (hasIn)      { statusClass='status-in';  statusText='근무중'; }

    const hours = calcHours(rec.in, rec.out);

    grid.innerHTML += `
    <div class="staff-card">
      <div class="staff-header">
        <div>
          <div class="staff-name">${s.name}</div>
          <div class="staff-role">${s.role}</div>
        </div>
        <span class="status-badge ${statusClass}">${statusText}</span>
      </div>
      <div class="time-row">
        <div class="time-box">
          <label>출근</label>
          <div class="time-val ${hasIn?'':'empty'}">${rec.in || '- -'}</div>
        </div>
        <div class="time-box">
          <label>퇴근</label>
          <div class="time-val ${hasOut?'':'empty'}">${rec.out || '- -'}</div>
        </div>
        <div class="time-box">
          <label>근무시간</label>
          <div class="time-val ${hours?'':'empty'}">${hours || '- -'}</div>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-in"  onclick="clockIn('${s.id}')"  ${(!today||hasIn)?'disabled':''}>출근</button>
        <button class="btn btn-out" onclick="clockOut('${s.id}')" ${(!today||!hasIn||hasOut)?'disabled':''}>퇴근</button>
        <button class="btn btn-reset" onclick="resetRecord('${s.id}')">↺</button>
      </div>
      <div class="memo-row">
        <input type="text" placeholder="메모 (특이사항 등)" value="${rec.memo||''}"
          onblur="saveMemo('${s.id}', this.value)"
          onkeydown="if(event.key==='Enter') this.blur()">
      </div>
    </div>`;
  });
}

function renderLog() {
  const list = document.getElementById('logList');
  const entries = STAFF.map(s => ({ ...s, rec: dayData[s.id]||{} }))
                       .filter(s => s.rec.in || s.rec.out);
  if (!entries.length) {
    list.innerHTML = '<p class="no-log">기록 없음</p>';
    return;
  }
  list.innerHTML = entries.map(s => {
    const h = calcHours(s.rec.in, s.rec.out);
    return `<div class="log-item">
      <span class="log-name">${s.name}</span>
      <span class="log-detail">${s.rec.in||'?'} → ${s.rec.out||'근무중'}</span>
      <span class="log-hours">${h||'진행중'}</span>
    </div>`;
  }).join('');
}

function updateSyncTime() {
  document.getElementById('syncTime').textContent =
    `마지막 저장: ${new Date().toLocaleTimeString('ko-KR')}`;
}

// ── Firebase 연결 상태 감지 ─────────────────
onValue(ref(db, '.info/connected'), (snap) => {
  const el = document.getElementById('connStatus');
  if (snap.val()) {
    el.textContent = '🟢 Firebase 실시간 연결됨';
    el.className = 'conn-status conn-ok';
  } else {
    el.textContent = '🔴 오프라인 — 재연결 시도 중';
    el.className = 'conn-status conn-err';
  }
});

// ── 초기 로드 ─────────────────────────────
loadDay();
</script>
</body>
</html>
