<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laurel Studio — 근태관리</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    background: #f5f0eb;
    min-height: 100vh;
    padding: 20px;
  }
  header {
    text-align: center;
    padding: 20px 0 28px;
  }
  header h1 {
    font-size: 20px;
    color: #3b2e2e;
    letter-spacing: 2px;
    font-weight: 600;
  }
  header p {
    font-size: 12px;
    color: #9e8a7e;
    margin-top: 4px;
    letter-spacing: 1px;
  }

  .date-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 20px;
  }
  .date-nav button {
    background: none;
    border: 1px solid #c9b8a8;
    border-radius: 50%;
    width: 32px; height: 32px;
    cursor: pointer;
    font-size: 16px;
    color: #6b5344;
  }
  .date-nav .date-label {
    font-size: 15px;
    font-weight: 600;
    color: #3b2e2e;
    min-width: 130px;
    text-align: center;
  }
  .today-btn {
    font-size: 11px;
    padding: 4px 10px;
    border: 1px solid #c9b8a8;
    border-radius: 12px;
    background: white;
    color: #6b5344;
    cursor: pointer;
  }

  .staff-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 480px;
    margin: 0 auto;
  }
  .staff-card {
    background: white;
    border-radius: 16px;
    padding: 18px 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .staff-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .staff-name {
    font-size: 16px;
    font-weight: 600;
    color: #3b2e2e;
  }
  .staff-role {
    font-size: 11px;
    color: #9e8a7e;
    margin-top: 2px;
  }
  .status-badge {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 500;
  }
  .status-off    { background: #f0ebe5; color: #9e8a7e; }
  .status-in     { background: #e8f5e9; color: #388e3c; }
  .status-break  { background: #fff3e0; color: #ef6c00; }
  .status-out    { background: #e3f2fd; color: #1565c0; }

  .time-row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }
  .time-box {
    flex: 1;
    background: #faf8f5;
    border-radius: 10px;
    padding: 10px 12px;
    text-align: center;
  }
  .time-box label {
    font-size: 10px;
    color: #9e8a7e;
    display: block;
    margin-bottom: 4px;
    letter-spacing: 0.5px;
  }
  .time-box .time-val {
    font-size: 18px;
    font-weight: 700;
    color: #3b2e2e;
    letter-spacing: 1px;
  }
  .time-box .time-val.empty {
    color: #d4c5b8;
    font-size: 14px;
    font-weight: 400;
  }
  .time-box.break-box { background: #fdf6ee; }
  .time-box.break-box .time-val { color: #ef6c00; }
  .time-box.actual-box { background: #f0f4ee; }
  .time-box.actual-box .time-val { color: #4a7c2f; }

  /* 휴식 상세 목록 */
  .break-detail {
    background: #fdf6ee;
    border-radius: 10px;
    padding: 8px 12px;
    margin-bottom: 12px;
    font-size: 11px;
    color: #b07d4a;
  }
  .break-detail .break-line {
    display: flex;
    justify-content: space-between;
    padding: 2px 0;
  }
  .break-detail .break-line:not(:last-child) {
    border-bottom: 1px dashed #f0e0cd;
  }

  .btn-row {
    display: flex;
    gap: 8px;
  }
  .btn-row + .btn-row { margin-top: 8px; }
  .btn {
    flex: 1;
    padding: 11px;
    border: none;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
    letter-spacing: 0.5px;
  }
  .btn:disabled { opacity: 0.35; cursor: default; }
  .btn-in  { background: #4caf50; color: white; }
  .btn-out { background: #2196f3; color: white; }
  .btn-break-start { background: #ff9800; color: white; }
  .btn-break-end   { background: #f57c00; color: white; }
  .btn-reset { background: #f5f0eb; color: #9e8a7e; border: 1px solid #e0d5cc; flex: 0 0 auto; padding: 11px 14px; }

  .memo-row {
    margin-top: 10px;
  }
  .memo-row input {
    width: 100%;
    border: 1px solid #e8ddd5;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    color: #3b2e2e;
    background: #faf8f5;
    outline: none;
  }
  .memo-row input:focus { border-color: #c9b8a8; }

  .log-section {
    max-width: 480px;
    margin: 24px auto 0;
    background: white;
    border-radius: 16px;
    padding: 18px 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .log-section h3 {
    font-size: 13px;
    color: #9e8a7e;
    margin-bottom: 12px;
    letter-spacing: 1px;
  }
  .log-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid #f5f0eb;
    font-size: 13px;
  }
  .log-item:last-child { border-bottom: none; }
  .log-name { color: #3b2e2e; font-weight: 500; flex: 0 0 56px; }
  .log-detail { color: #9e8a7e; font-size: 12px; flex: 1; text-align: center; }
  .log-break { color: #ef6c00; font-size: 11px; flex: 0 0 auto; margin-right: 10px; }
  .log-hours { color: #6b5344; font-weight: 600; flex: 0 0 auto; }
  .no-log { color: #d4c5b8; font-size: 13px; text-align: center; padding: 12px 0; }

  .conn-status {
    text-align: center;
    font-size: 11px;
    margin-bottom: 16px;
    padding: 6px;
    border-radius: 8px;
  }
  .conn-ok  { color: #4caf50; background: #e8f5e9; }
  .conn-err { color: #f44336; background: #ffebee; }
  .conn-ing { color: #ff9800; background: #fff3e0; }

  .sync-time {
    text-align: center;
    font-size: 10px;
    color: #c9b8a8;
    margin-top: 16px;
    margin-bottom: 8px;
  }

  .location-status {
    text-align: center;
    font-size: 11px;
    margin: 0 auto 12px;
    padding: 6px 12px;
    border-radius: 8px;
    max-width: 480px;
  }
  .loc-ok      { color: #4caf50; background: #e8f5e9; }
  .loc-far     { color: #f44336; background: #ffebee; }
  .loc-loading { color: #ff9800; background: #fff3e0; }
  .loc-error   { color: #9e8a7e; background: #f5f0eb; }

/* ══ 데스크톱 반응형 (추가 전용) ══ */
@media (min-width:768px){
  body{padding:24px 32px}
  .staff-grid{max-width:720px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .log-section{max-width:720px}
  .location-status{max-width:720px}
  header h1{font-size:23px}
}
@media (min-width:1024px){
  body{padding:28px 40px}
  .staff-grid{max-width:1040px;grid-template-columns:repeat(3,1fr);gap:16px}
  .log-section{max-width:1040px}
  .location-status{max-width:1040px}
  .date-nav{max-width:1040px;margin-left:auto;margin-right:auto}
  header h1{font-size:26px}
}
@media (min-width:1440px){
  .staff-grid{max-width:1280px;grid-template-columns:repeat(4,1fr)}
  .log-section,.location-status,.date-nav{max-width:1280px}
}
</style>
</head>
<body>

<header>
  <h1>🌿 LAUREL STUDIO</h1>
  <p>근태 관리</p>
</header>

<div class="conn-status conn-ing" id="connStatus">Firebase 연결 중...</div>
<div class="location-status loc-loading" id="locStatus">📍 위치 확인 중...</div>

<div class="date-nav">
  <button onclick="changeDate(-1)">‹</button>
  <span class="date-label" id="dateLabel"></span>
  <button onclick="changeDate(1)">›</button>
  <button class="today-btn" onclick="goToday()">오늘</button>
</div>

<div class="staff-grid" id="staffGrid"></div>

<div class="log-section">
  <h3>📋 당일 요약</h3>
  <div id="logList"><p class="no-log">기록 없음</p></div>
</div>

<div class="sync-time" id="syncTime"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA0nJAcOV64dq2QT2BVSsGxis99VTA2eEI",
  authDomain: "laurel-studio.firebaseapp.com",
  databaseURL: "https://laurel-studio-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "laurel-studio",
  storageBucket: "laurel-studio.firebasestorage.app",
  messagingSenderId: "516403607342",
  appId: "1:516403607342:web:5389cdfe397afcee1cacbf",
  measurementId: "G-JXJVBBYW9P"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// ── 로렐 스튜디오 정확한 위치 ─────────────
const STUDIO_LAT = 37.555559;
const STUDIO_LNG = 126.920661;
const ALLOWED_RADIUS_M = 200;

let isNearStudio = false;

function calcDistance(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2-lat1) * Math.PI/180;
  const dLng = (lng2-lng1) * Math.PI/180;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function checkLocation() {
  const el = document.getElementById('locStatus');
  if (!navigator.geolocation) {
    el.textContent = '📍 GPS를 지원하지 않는 기기예요';
    el.className = 'location-status loc-error';
    isNearStudio = false;
    renderAll();
    return;
  }
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const dist = calcDistance(pos.coords.latitude, pos.coords.longitude, STUDIO_LAT, STUDIO_LNG);
      const distM = Math.round(dist);
      if (dist <= ALLOWED_RADIUS_M) {
        el.textContent = `✅ 매장 근처 확인 (${distM}m) — 출퇴근 가능`;
        el.className = 'location-status loc-ok';
        isNearStudio = true;
      } else {
        el.textContent = `🚫 매장에서 ${distM}m 떨어져 있어요 — 출퇴근 불가`;
        el.className = 'location-status loc-far';
        isNearStudio = false;
      }
      renderAll();
    },
    (err) => {
      el.textContent = '📍 위치 권한을 허용해주세요';
      el.className = 'location-status loc-error';
      isNearStudio = false;
      renderAll();
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

checkLocation();
setInterval(checkLocation, 30000);

const STAFF = [
  { id: "yejin",  name: "배예진", role: "매니저" },
  { id: "dawn",   name: "다운",   role: "웨이팅룸 담당" },
  { id: "sujin",  name: "수진",   role: "매니저 (5월~)" },
];

let currentDate = new Date();
function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function dateDisplay(d) {
  const days = ['일','월','화','수','목','금','토'];
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
}
function isToday(d) {
  const t = new Date();
  return dateKey(d) === dateKey(t);
}

window.changeDate = (delta) => {
  currentDate.setDate(currentDate.getDate() + delta);
  loadDay();
};
window.goToday = () => { currentDate = new Date(); loadDay(); };

let dayData = {};

function dbPath(staffId) {
  return `attendance/${dateKey(currentDate)}/${staffId}`;
}

async function saveRecord(staffId) {
  const r = dayData[staffId] || {};
  await set(ref(db, dbPath(staffId)), r);
  updateSyncTime();
}

async function loadDay() {
  document.getElementById('dateLabel').textContent = dateDisplay(currentDate);
  const snap = await get(ref(db, `attendance/${dateKey(currentDate)}`));
  dayData = snap.exists() ? snap.val() : {};
  renderAll();
}

window.clockIn = (staffId) => {
  if (!isNearStudio) { alert('📍 매장 근처에서만 출근 체크가 가능해요!'); return; }
  if (!dayData[staffId]) dayData[staffId] = {};
  dayData[staffId].in = nowHHMM();
  saveRecord(staffId);
  renderAll();
};
window.clockOut = (staffId) => {
  if (!isNearStudio) { alert('📍 매장 근처에서만 퇴근 체크가 가능해요!'); return; }
  const rec = dayData[staffId] || {};
  // 휴식 중이면 퇴근 막기
  if (isOnBreak(rec)) {
    alert('☕ 휴식 중이에요. "휴식 종료"를 먼저 눌러주세요!');
    return;
  }
  if (!dayData[staffId]) dayData[staffId] = {};
  dayData[staffId].out = nowHHMM();
  saveRecord(staffId);
  renderAll();
};

// ── 휴식 기능 ──────────────────────────────
window.breakStart = (staffId) => {
  if (!isNearStudio) { alert('📍 매장 근처에서만 휴식 체크가 가능해요!'); return; }
  const rec = dayData[staffId] || {};
  if (!rec.in)  { alert('출근 후에 휴식을 시작할 수 있어요!'); return; }
  if (rec.out)  { alert('이미 퇴근한 기록이에요.'); return; }
  if (isOnBreak(rec)) { alert('이미 휴식 중이에요.'); return; }
  if (!dayData[staffId]) dayData[staffId] = {};
  if (!dayData[staffId].breaks) dayData[staffId].breaks = [];
  dayData[staffId].breaks.push({ start: nowHHMM(), end: null });
  saveRecord(staffId);
  renderAll();
};
window.breakEnd = (staffId) => {
  if (!isNearStudio) { alert('📍 매장 근처에서만 휴식 체크가 가능해요!'); return; }
  const rec = dayData[staffId] || {};
  if (!isOnBreak(rec)) { alert('진행 중인 휴식이 없어요.'); return; }
  const last = rec.breaks[rec.breaks.length - 1];
  last.end = nowHHMM();
  saveRecord(staffId);
  renderAll();
};

// 현재 휴식 중인지 (마지막 휴식 기록에 end가 없으면 휴식 중)
function isOnBreak(rec) {
  if (!rec.breaks || !rec.breaks.length) return false;
  const last = rec.breaks[rec.breaks.length - 1];
  return last && last.start && !last.end;
}

window.resetRecord = (staffId) => {
  if (!confirm(`${STAFF.find(s=>s.id===staffId).name} 기록을 초기화할까요?`)) return;
  dayData[staffId] = {};
  saveRecord(staffId);
  renderAll();
};
window.saveMemo = (staffId, val) => {
  if (!dayData[staffId]) dayData[staffId] = {};
  dayData[staffId].memo = val;
  saveRecord(staffId);
};

function nowHHMM() {
  const n = new Date();
  return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
}

// 분 단위로 변환
function toMin(hhmm) {
  if (!hhmm) return null;
  const [h, m] = hhmm.split(':').map(Number);
  return h*60 + m;
}

// 분 → "Xh Ym" 표기
function fmtMin(diff) {
  if (diff == null || diff <= 0) return null;
  const h = Math.floor(diff/60), m = diff%60;
  if (h && m) return `${h}h ${m}m`;
  if (h)      return `${h}h`;
  return `${m}m`;
}

// 총 휴식 시간(분) — 완료된 휴식만 합산
function totalBreakMin(rec) {
  if (!rec.breaks || !rec.breaks.length) return 0;
  let sum = 0;
  rec.breaks.forEach(b => {
    const s = toMin(b.start), e = toMin(b.end);
    if (s != null && e != null && e > s) sum += (e - s);
  });
  return sum;
}

// 전체 근무시간(분) = 퇴근 - 출근
function grossMin(rec) {
  const s = toMin(rec.in), e = toMin(rec.out);
  if (s == null || e == null || e <= s) return null;
  return e - s;
}

// 실근무시간(분) = 전체 - 휴식
function actualMin(rec) {
  const g = grossMin(rec);
  if (g == null) return null;
  return Math.max(0, g - totalBreakMin(rec));
}

function renderAll() {
  renderCards();
  renderLog();
}

function renderCards() {
  const grid = document.getElementById('staffGrid');
  grid.innerHTML = '';
  const today = isToday(currentDate);

  STAFF.forEach(s => {
    const rec = dayData[s.id] || {};
    const hasIn  = !!rec.in;
    const hasOut = !!rec.out;
    const onBreak = isOnBreak(rec);

    let statusClass = 'status-off', statusText = '미출근';
    if (hasIn && hasOut)      { statusClass='status-out';   statusText='퇴근'; }
    else if (onBreak)         { statusClass='status-break'; statusText='휴식중'; }
    else if (hasIn)           { statusClass='status-in';    statusText='근무중'; }

    const breakMin = totalBreakMin(rec);
    const breakStr = breakMin > 0 ? fmtMin(breakMin) : null;
    const actualStr = fmtMin(actualMin(rec));

    // 휴식 상세 줄
    let breakDetailHTML = '';
    if (rec.breaks && rec.breaks.length) {
      const lines = rec.breaks.map((b, i) => {
        const dur = (toMin(b.start)!=null && toMin(b.end)!=null && toMin(b.end)>toMin(b.start))
                    ? fmtMin(toMin(b.end)-toMin(b.start)) : '진행중';
        return `<div class="break-line">
          <span>☕ 휴식 ${i+1}</span>
          <span>${b.start || '?'} → ${b.end || '진행중'} &nbsp;(${dur})</span>
        </div>`;
      }).join('');
      breakDetailHTML = `<div class="break-detail">${lines}</div>`;
    }

    grid.innerHTML += `
    <div class="staff-card">
      <div class="staff-header">
        <div>
          <div class="staff-name">${s.name}</div>
          <div class="staff-role">${s.role}</div>
        </div>
        <span class="status-badge ${statusClass}">${statusText}</span>
      </div>
      <div class="time-row">
        <div class="time-box">
          <label>출근</label>
          <div class="time-val ${hasIn?'':'empty'}">${rec.in || '- -'}</div>
        </div>
        <div class="time-box">
          <label>퇴근</label>
          <div class="time-val ${hasOut?'':'empty'}">${rec.out || '- -'}</div>
        </div>
      </div>
      <div class="time-row">
        <div class="time-box break-box">
          <label>휴식 합계</label>
          <div class="time-val ${breakStr?'':'empty'}">${breakStr || '- -'}</div>
        </div>
        <div class="time-box actual-box">
          <label>실근무시간</label>
          <div class="time-val ${actualStr?'':'empty'}">${actualStr || '- -'}</div>
        </div>
      </div>
      ${breakDetailHTML}
      <div class="btn-row">
        <button class="btn btn-in"  onclick="clockIn('${s.id}')"  ${(!today||hasIn)?'disabled':''}>출근</button>
        <button class="btn btn-out" onclick="clockOut('${s.id}')" ${(!today||!hasIn||hasOut||onBreak)?'disabled':''}>퇴근</button>
        <button class="btn btn-reset" onclick="resetRecord('${s.id}')">↺</button>
      </div>
      <div class="btn-row">
        <button class="btn btn-break-start" onclick="breakStart('${s.id}')" ${(!today||!hasIn||hasOut||onBreak)?'disabled':''}>휴식 시작</button>
        <button class="btn btn-break-end"   onclick="breakEnd('${s.id}')"   ${(!today||!onBreak)?'disabled':''}>휴식 종료</button>
      </div>
      <div class="memo-row">
        <input type="text" placeholder="메모 (특이사항 등)" value="${rec.memo||''}"
          onblur="saveMemo('${s.id}', this.value)"
          onkeydown="if(event.key==='Enter') this.blur()">
      </div>
    </div>`;
  });
}

function renderLog() {
  const list = document.getElementById('logList');
  const entries = STAFF.map(s => ({ ...s, rec: dayData[s.id]||{} }))
                       .filter(s => s.rec.in || s.rec.out);
  if (!entries.length) {
    list.innerHTML = '<p class="no-log">기록 없음</p>';
    return;
  }
  list.innerHTML = entries.map(s => {
    const actual = fmtMin(actualMin(s.rec));
    const bMin = totalBreakMin(s.rec);
    const bStr = bMin > 0 ? `휴식 ${fmtMin(bMin)}` : '';
    const onBreak = isOnBreak(s.rec);
    let detail = `${s.rec.in||'?'} → ${s.rec.out || (onBreak ? '휴식중' : '근무중')}`;
    return `<div class="log-item">
      <span class="log-name">${s.name}</span>
      <span class="log-detail">${detail}</span>
      <span class="log-break">${bStr}</span>
      <span class="log-hours">${actual || (onBreak ? '휴식중' : '진행중')}</span>
    </div>`;
  }).join('');
}

function updateSyncTime() {
  document.getElementById('syncTime').textContent =
    `마지막 저장: ${new Date().toLocaleTimeString('ko-KR')}`;
}

onValue(ref(db, '.info/connected'), (snap) => {
  const el = document.getElementById('connStatus');
  if (snap.val()) {
    el.textContent = '🟢 Firebase 실시간 연결됨';
    el.className = 'conn-status conn-ok';
  } else {
    el.textContent = '🔴 오프라인 — 재연결 시도 중';
    el.className = 'conn-status conn-err';
  }
});

loadDay();
</script>
</body>
</html>
